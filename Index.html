<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SNSD Adventure</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { background:#111; display:block; }

.controls {
  position:fixed; bottom:20px; width:100%; text-align:center;
}
button {
  font-size:20px; padding:15px; margin:5px;
  border-radius:10px; border:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <button ontouchstart="left=true" ontouchend="left=false">⬅️</button>
  <button ontouchstart="right=true" ontouchend="right=false">➡️</button>
  <button ontouchstart="jump()">⬆️</button>
  <button ontouchstart="useSkill()">✨</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER =====
let player = { x:50, y:300, w:40, h:40, dy:0, hp:3, silenced:false };
let gravity = 1;
let left=false, right=false;
let currentChar = 1;

// ===== LEVEL =====
let level = 1;
let timer = 60;

// ===== MIC =====
let mics = [
 {x:800,y:300,collected:false},
 {x:1000,y:300,collected:false},
 {x:1200,y:300,collected:false}
];

// ===== BOSS =====
let boss = { x:1200,y:280,w:80,h:80,hp:5,active:false,cooldown:0,weak:false };

// ===== EFFECT =====
let effects=[];

// ===== FIREWORK =====
let fireworks=[], particles=[];

// ===== CONFETTI =====
let confetti=[];

// ===== LOGO =====
const logo = new Image();
logo.src = "logo.png";

// ===== CONTROLS =====
function jump(){ player.dy=-15; }

function useSkill(){
 if(player.silenced) return;
 addEffect(player.x,player.y,"blast");
}

// ===== UPDATE =====
function update(){
 player.dy += gravity;
 player.y += player.dy;

 if(player.y > 300){ player.y=300; player.dy=0; }

 if(left) player.x -=5;
 if(right) player.x +=5;

 // LEVEL SWITCH
 if(player.x > 700 && level==1){ level=2; }
 if(player.x > 1400 && level==2){ level=3; }

 // BOSS
 if(level==2 && player.x>1000) boss.active=true;

 updateBoss();
 updateFireworks();
 updateParticles();
 updateConfetti();

 // TIMER
 if(level==3){
   timer -= 0.016;
   if(timer<=0) location.reload();
 }

 // MIC
 if(level==3){
   mics.forEach(m=>{
     if(!m.collected && collide(player,{x:m.x,y:m.y,w:30,h:30})){
       m.collected=true;
     }
   });

   if(mics.every(m=>m.collected)){
     ending();
   }
 }
}

// ===== DRAW =====
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawPlayer();

 if(level==3){
   drawMics();
   ctx.fillStyle="white";
   ctx.fillText("Time:"+Math.floor(timer),10,50);
 }

 drawBoss();
 drawFireworks();
 drawParticles();
 drawConfetti();
 drawCrowd();
}

// ===== PLAYER DRAW =====
function drawPlayer(){
 ctx.fillStyle="cyan";
 ctx.fillRect(player.x,player.y,player.w,player.h);
}

// ===== BOSS =====
function updateBoss(){
 if(!boss.active) return;

 boss.cooldown--;
 if(boss.cooldown<=0){
   spawnFirework();
   boss.cooldown=100;
   boss.weak=true;
   setTimeout(()=>boss.weak=false,2000);
 }
}

function drawBoss(){
 if(!boss.active) return;
 ctx.fillStyle=boss.weak?"red":"black";
 ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
}

// ===== MIC =====
function drawMics(){
 ctx.fillStyle="gold";
 mics.forEach(m=>{
   if(!m.collected){
     ctx.fillRect(m.x,m.y,30,30);
   }
 });
}

// ===== EFFECT =====
function addEffect(x,y,type){
 effects.push({x,y,life:20});
}

// ===== FIREWORK =====
function spawnFirework(){
 fireworks.push({
  x:Math.random()canvas.width,
  y:canvas.height,
  targetY:100,
  color:"pink"
 });
}

function updateFireworks(){
 fireworks.forEach((f,i)=>{
  f.y-=5;
  if(f.y<=f.targetY){
    explodeHeart(f.x,f.y,f.color);
    fireworks.splice(i,1);
  }
 });
}

function explodeHeart(x,y,color){
 for(let i=0;i<50;i++){
  let t=(Math.PI2)(i/50);
  let dx=16Math.pow(Math.sin(t),3);
  let dy=-(13Math.cos(t)-5Math.cos(2t)-2Math.cos(3t)-Math.cos(4t));
  particles.push({x,y,dx:dx0.3,dy:dy0.3,life:60,color});
 }
}

function updateParticles(){
 particles.forEach((p,i)=>{
  p.x+=p.dx;
  p.y+=p.dy;
  p.life--;
  if(p.life<=0) particles.splice(i,1);
 });
}

function drawFireworks(){
 fireworks.forEach(f=>{
  ctx.fillStyle=f.color;
  ctx.fillRect(f.x,f.y,3,10);
 });
}

function drawParticles(){
 particles.forEach(p=>{
  ctx.fillStyle=p.color;
  ctx.fillRect(p.x,p.y,3,3);
 });
}

// ===== CONFETTI =====
function spawnConfetti(){
 for(let i=0;i<3;i++){
  confetti.push({x:Math.random()canvas.width,y:-10,speed:2});
 }
}

function updateConfetti(){
 spawnConfetti();
 confetti.forEach((c,i)=>{
  c.y+=c.speed;
  if(c.y>canvas.height) confetti.splice(i,1);
 });
}

function drawConfetti(){
 confetti.forEach(c=>{
  ctx.fillStyle="pink";
  ctx.fillRect(c.x,c.y,5,5);
 });
}

// ===== CROWD =====
function drawCrowd(){
 for(let i=0;i<50;i++){
  ctx.fillStyle="black";
  ctx.fillRect(i20,400,10,30);
 }
}

// ===== ENDING =====
function ending(){
 showCredits();
}

function showCredits(){
 let alpha=0;
 let interval=setInterval(()=>{
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalAlpha=alpha;
  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Game by Thomy",100,200);
  ctx.drawImage(logo,100,250,200,200);

  ctx.globalAlpha=1;

  if(alpha<1) alpha+=0.02;
  else clearInterval(interval);

 },50);
}

// ===== COLLISION =====
function collide(a,b){
 return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ===== LOOP =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

</script>
</body>
</htm
