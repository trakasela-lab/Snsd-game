<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SNSD Game</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:1;
  background:#222;
}

.controls {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  z-index:999;
}

button {
  font-size:20px;
  padding:15px;
  margin:5px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <button onclick="left=true">⬅️</button>
  <button onclick="right=true">➡️</button>
  <button onclick="jump()">⬆️</button>
</div>

<script>
var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
var x = 50;
var y = 200;
var dy = 0;
var gravity = 1;

var left=false;
var right=false;

// SIMPLE GAME LOOP (PAKAI setInterval, BUKAN requestAnimationFrame)
setInterval(function(){

  // UPDATE
  dy += gravity;
  y += dy;

  if(y > 300){
    y = 300;
    dy = 0;
  }

  if(left){
    x -= 5;
    left = false;
  }

  if(right){
    x += 5;
    right = false;
  }

  // DRAW
  ctx.fillStyle = "#222";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // player
  ctx.fillStyle = "cyan";
  ctx.fillRect(x,y,50,50);

  // text debug (biar tahu render jalan)
  ctx.fillStyle = "white";
  ctx.fillText("GAME RUNNING",20,30);

},30);

// JUMP
function jump(){
  dy = -15;
}
</script>

</body>
</html>
